<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>局部编辑 - 妙绘 MioDraw</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e3e2e5",
                        "primary-fixed": "#e8deff",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#fcf6ff",
                        "surface-bright": "#f9f9f9",
                        "on-background": "#1a1c1c",
                        "secondary-fixed-dim": "#c6c6cb",
                        "inverse-on-surface": "#f0f1f1",
                        "error-container": "#ffdad6",
                        "primary": "#632ce5",
                        "tertiary-container": "#727275",
                        "on-surface-variant": "#494455",
                        "on-secondary-fixed": "#1a1c1f",
                        "on-surface": "#1a1c1c",
                        "on-tertiary-fixed": "#1b1b1e",
                        "inverse-primary": "#cdbdff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "surface-container-low": "#f3f3f4",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#616267",
                        "on-error-container": "#93000a",
                        "secondary": "#5d5e63",
                        "outline": "#7a7487",
                        "surface-container": "#eeeeee",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#cac3d8",
                        "on-secondary-fixed-variant": "#45474b",
                        "surface-tint": "#6833ea",
                        "on-primary-fixed": "#20005f",
                        "secondary-container": "#dfdfe4",
                        "surface-container-highest": "#e2e2e2",
                        "inverse-surface": "#2f3131",
                        "tertiary": "#595a5c",
                        "primary-container": "#7c4dff",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#4f00d0",
                        "on-tertiary-container": "#faf8fb",
                        "background": "#f9f9f9",
                        "surface": "#f9f9f9",
                        "tertiary-fixed-dim": "#c7c6c9",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#e2e2e7",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#464649",
                        "surface-variant": "#e2e2e2",
                        "primary-fixed-dim": "#cdbdff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-grid": "12px",
                        "margin-main": "20px",
                        "stack-sm": "8px",
                        "safe-area-bottom": "34px",
                        "stack-md": "16px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h2": ["Manrope"],
                        "h1": ["Manrope"],
                        "caption": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Manrope"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "h1": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "caption": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-lg": ["17px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["15px", { "lineHeight": "21px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .backdrop-blur-ultra { backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }
        .mask-overlay {
            mask-image: radial-gradient(circle at 45% 60%, black 15%, transparent 25%);
            -webkit-mask-image: radial-gradient(circle at 45% 60%, black 15%, transparent 25%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen overflow-hidden flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation (Immersive Editor Style) -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-2xl border-b border-white/20 dark:border-zinc-800/50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] flex items-center justify-between px-5 h-16 pt-safe-top">
<button class="text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95 duration-200 font-body-md font-medium">取消</button>
<h1 class="text-on-surface font-h2 font-semibold tracking-tight text-center absolute left-1/2 -translate-x-1/2">局部编辑</h1>
<button class="text-primary hover:opacity-70 transition-opacity active:scale-95 duration-200 font-body-md font-semibold">完成</button>
</header>
<!-- Canvas Area (Immersive Image) -->
<main class="flex-grow relative bg-[#000000] overflow-hidden pt-16 pb-[140px] flex items-center justify-center">
<!-- Main Image -->
<div class="relative w-full max-w-2xl mx-auto h-full flex items-center justify-center px-4">
<div class="relative w-full aspect-[3/4] bg-surface-container rounded-lg overflow-hidden shadow-2xl">
<!-- Base Image Layer -->
<img alt="Canvas Base" class="w-full h-full object-cover absolute inset-0 z-0" data-alt="A high-resolution photograph of a modern, minimalist living room setting. The scene features a sleek, low-profile gray sofa, a minimalist coffee table, and an empty wall space above the sofa. The lighting is soft, diffused, and natural, creating a serene, bright, high-end editorial aesthetic typical of premium interior design photography. The color palette is composed of soft grays, warm whites, and subtle earth tones, perfectly matching the 'Quiet Luxury' brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3zAYKoQcXT7d_3JBMzR-bJV2rZ3BhWW4monk3QDu5xqb91etN5hYMPfzLhOKvd4_KsVDfYDv-QaIGufI36nNjpUihlpLpgXZRPrBossbdXDEQ0jfmzfZJnynOzBplg1ZEoP2Rpia1igi8n4KBjSvKAoCTZ3UZcqyp6QsU0IXpfKeNyM8LwRVOXzEBSsV0aW40OQQsIIzqKkh_g8B6d-0tlheV2xQo9KskkWyJ40fbZ03SuVOL-j3HGDvajifsZJIzL1ghc3F8bQ"/>
<!-- Purple Tint Selection Overlay -->
<div class="absolute inset-0 z-10 bg-primary/20 backdrop-blur-sm pointer-events-none mix-blend-overlay"></div>
<!-- Unmasked Area (The User's Selection) -->
<div class="absolute inset-0 z-20 mask-overlay">
<img alt="Canvas Masked" class="w-full h-full object-cover" data-alt="Duplicate of the high-resolution photograph of a modern, minimalist living room setting used for masking purposes in the UI. Matches the exact description of the base image." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdFHnst1bYpg_btzzIpsaNVGSTlKDG7HEc-Z3gwYlqCvfHxblKqsNzK_c-VyD0J1bMNlqqG-9FsUZ36I0pYVzisjhqdxBuYDTqFGx3YpuSW_s6dxgYDQvs32oQThm5_S_I1TKE1ig6txBECMWkcZyZ1XX3ZWtd6-lq9W7vPmMg4kHOZSdpGOLzGSxXdLhRCEjB7ylDlpfLSj6avTDopOlw3cB7pjvc4JuffaX7r1SFMiYxGXpzBB5-uVriKEOzr-dxPm3G6k23bA"/>
</div>
<!-- Subtle selection indicator line -->
<div class="absolute top-[45%] left-[30%] w-[30%] h-[30%] border-2 border-primary border-dashed rounded-[40%_60%_70%_30%] z-30 opacity-70 animate-pulse pointer-events-none" style="filter: drop-shadow(0 0 8px rgba(124, 77, 255, 0.5));"></div>
</div>
</div>
<!-- Toast Hint -->
<div class="absolute top-20 left-1/2 -translate-x-1/2 z-40 bg-on-surface/80 backdrop-blur-md text-on-primary px-4 py-2 rounded-full font-caption shadow-lg text-center">
            圈选区域后输入修改要求
        </div>
</main>
<!-- Bottom Toolbar (Glassmorphism) -->
<div class="fixed bottom-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-ultra border-t border-zinc-200/50 dark:border-zinc-800/50 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] pb-safe-area-bottom pt-4 px-margin-main flex flex-col gap-4">
<!-- Tool Icons Row -->
<div class="flex justify-between items-center max-w-md mx-auto w-full px-2">
<!-- Brush (Active) -->
<button aria-label="画笔" class="flex flex-col items-center justify-center gap-1 text-primary group active:scale-90 transition-transform duration-200">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="brush" style="font-variation-settings: 'FILL' 1;">brush</span>
</div>
<span class="font-label-caps text-[10px]">画笔</span>
</button>
<!-- Eraser -->
<button aria-label="橡皮" class="flex flex-col items-center justify-center gap-1 text-on-surface-variant hover:text-primary transition-colors active:scale-90 duration-200">
<div class="w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="ink_eraser">ink_eraser</span>
</div>
<span class="font-label-caps text-[10px]">橡皮</span>
</button>
<!-- Divider -->
<div class="w-px h-6 bg-outline-variant/50"></div>
<!-- Undo -->
<button aria-label="撤销" class="flex flex-col items-center justify-center gap-1 text-on-surface-variant hover:text-on-surface transition-colors active:scale-90 duration-200">
<div class="w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="undo">undo</span>
</div>
</button>
<!-- Redo (Disabled) -->
<button aria-label="重做" class="flex flex-col items-center justify-center gap-1 text-outline-variant cursor-not-allowed" disabled="">
<div class="w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="redo">redo</span>
</div>
</button>
<!-- Divider -->
<div class="w-px h-6 bg-outline-variant/50"></div>
<!-- Compare -->
<button aria-label="对比" class="flex flex-col items-center justify-center gap-1 text-on-surface-variant hover:text-on-surface transition-colors active:scale-90 duration-200">
<div class="w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="compare">compare</span>
</div>
</button>
<!-- Clear -->
<button aria-label="清除" class="flex flex-col items-center justify-center gap-1 text-on-surface-variant hover:text-error transition-colors active:scale-90 duration-200">
<div class="w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</div>
</button>
</div>
<!-- Prompt Input & Action Row -->
<div class="flex items-center gap-3 w-full max-w-md mx-auto mb-2">
<div class="relative flex-grow">
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-full py-3 pl-4 pr-10 font-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors shadow-sm placeholder:text-on-surface-variant/50" placeholder="描述你想修改圈选区域的方式..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mic">mic</span>
</button>
</div>
<button class="bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-body-md font-medium py-3 px-5 rounded-full shadow-[0_4px_12px_rgba(124,77,255,0.3)] active:scale-95 transition-all duration-200 whitespace-nowrap flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" data-icon="auto_awesome">auto_awesome</span>
                应用
            </button>
</div>
</div>
</body></html>
